<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1440px; background: #0a0e27; font-family: -apple-system, "PingFang SC", sans-serif; overflow: hidden; }
.container { width: 100%; height: 100%; padding: 80px 70px; display: flex; flex-direction: column; justify-content: space-between; }
.top { text-align: center; }
.badge { display: inline-block; background: linear-gradient(135deg, #00d4aa, #00b894); color: #fff; font-size: 28px; padding: 12px 36px; border-radius: 50px; font-weight: 700; letter-spacing: 2px; margin-bottom: 40px; }
.title { font-size: 88px; font-weight: 900; color: #fff; line-height: 1.15; margin-bottom: 20px; }
.title .highlight { color: #00d4aa; }
.subtitle { font-size: 36px; color: rgba(255,255,255,0.6); line-height: 1.6; }
.charts { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 36px; }
.chart-row { display: flex; align-items: center; gap: 24px; }
.model-name { width: 280px; text-align: right; font-size: 30px; color: rgba(255,255,255,0.8); font-weight: 600; }
.bar-bg { flex: 1; height: 52px; background: rgba(255,255,255,0.08); border-radius: 26px; overflow: hidden; position: relative; }
.bar { height: 100%; border-radius: 26px; display: flex; align-items: center; justify-content: flex-end; padding-right: 24px; font-size: 28px; font-weight: 700; color: #fff; }
.bar-30 { width: 30%; background: linear-gradient(90deg, #e74c3c, #ff6b6b); }
.bar-40 { width: 40%; background: linear-gradient(90deg, #f39c12, #fdcb6e); }
.bar-100 { width: 100%; background: linear-gradient(90deg, #00b894, #00d4aa); }
.bottom { display: flex; justify-content: space-between; align-items: flex-end; }
.tags { display: flex; gap: 16px; flex-wrap: wrap; }
.tag { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); font-size: 24px; padding: 10px 24px; border-radius: 20px; }
.stats { text-align: right; }
.stat { font-size: 26px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
.stat strong { color: #00d4aa; font-size: 32px; }
.glow { position: absolute; width: 400px; height: 400px; border-radius: 50%; filter: blur(120px); opacity: 0.15; }
.glow1 { top: -100px; right: -100px; background: #00d4aa; }
.glow2 { bottom: -100px; left: -100px; background: #6c5ce7; }
</style>
</head>
<body>
<div class="glow glow1"></div>
<div class="glow glow2"></div>
<div class="container">
  <div class="top">
    <div class="badge">本地向量记忆 · 零云依赖</div>
    <div class="title">中文命中率<br><span class="highlight">30% → 100%</span></div>
    <div class="subtitle">Ollama + Qdrant · 7.5小时踩坑实录</div>
  </div>
  <div class="charts">
    <div class="chart-row">
      <div class="model-name">nomic-embed-text</div>
      <div class="bar-bg"><div class="bar bar-30">30%</div></div>
    </div>
    <div class="chart-row">
      <div class="model-name">bge-m3</div>
      <div class="bar-bg"><div class="bar bar-40">40%</div></div>
    </div>
    <div class="chart-row">
      <div class="model-name">qwen3-embedding:4b</div>
      <div class="bar-bg"><div class="bar bar-100">100% ✅</div></div>
    </div>
  </div>
  <div class="bottom">
    <div class="tags">
      <div class="tag"># Ollama</div>
      <div class="tag"># 向量数据库</div>
      <div class="tag"># 本地部署</div>
      <div class="tag"># 开源</div>
    </div>
    <div class="stats">
      <div class="stat">搜索速度 <strong>0.2s</strong>/query</div>
      <div class="stat">Embedding <strong>232ms</strong></div>
    </div>
  </div>
</div>
</body>
</html>
